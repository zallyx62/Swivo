<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo – Version Officielle</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #6c63ff; --bg: #080810; --panel: #13131e;
            --text: #f0f0f8; --text-dim: #9090a8; --border: rgba(255,255,255,0.08);
            --radius: 20px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* --- AUTH --- */
        #page-auth { position: absolute; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .logo-luxe { font-family: 'Syne'; font-size: 3.5rem; background: linear-gradient(135deg, var(--accent), #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .input-sw { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 14px; margin-top: 10px; outline: none; }
        .btn-sw { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        /* --- UI ELEMENTS --- */
        .header { padding: 15px 20px; display: none; border-bottom: 1px solid var(--border); }
        .logo-s { font-family: 'Syne'; font-size: 1.5rem; color: var(--accent); }
        
        .screen { flex: 1; display: none; flex-direction: column; padding: 15px 16px 100px; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .card { background: var(--panel); margin-bottom: 15px; border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); }
        
        /* --- NAV --- */
        .nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: var(--panel); border-top: 1px solid var(--border); display: none; align-items: center; justify-content: space-around; }
        .nav-i { opacity: 0.5; font-size: 1.3rem; cursor: pointer; }
        .nav-i.active { opacity: 1; color: var(--accent); }

        /* --- MENU PROFIL --- */
        .menu-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app-shell">
        
        <div id="page-auth">
            <h1 class="logo-luxe">Swivo</h1>
            <p style="opacity:0.6; margin-bottom:20px;">Prêt pour l'expérience ?</p>
            <input type="email" id="email" class="input-sw" placeholder="Email">
            <input type="password" id="pass" class="input-sw" placeholder="Mot de passe">
            <button class="btn-sw" onclick="connexion()">Se connecter</button>
            <button class="btn-sw" style="background:transparent; border:1px solid var(--accent);" onclick="inscription()">Créer un compte</button>
            <p style="color:var(--accent); font-size:0.8rem; margin-top:20px; cursor:pointer;" onclick="alert('Lien de récupération envoyé !')">Mot de passe oublié ?</p>
        </div>

        <div id="main-header" class="header">
            <div class="logo-s">Swivo</div>
        </div>

        <div id="screen-feed" class="screen">
            <div class="card">
                <p style="font-weight: 800; color: var(--accent);">POUR TOI ✨</p>
                <div style="width:100%; height:200px; background:#000; border-radius:15px; margin: 15px 0; display:flex; align-items:center; justify-content:center; color:#444;">VIDÉO TEST</div>
                <div style="display:flex; gap:15px;">❤️ 💬 🔄</div>
            </div>
            <div class="card">
                <b>Conseil du jour 💡</b>
                <p style="opacity:0.7; font-size:0.9rem; margin-top:5px;">Sois authentique, c'est ce qui marche le mieux sur Swivo.</p>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div style="text-align: center; margin-bottom: 25px;">
                <div style="width:80px; height:80px; background:linear-gradient(45deg, var(--accent), #ff6584); border-radius:50%; margin: 0 auto 10px;"></div>
                <h2 id="user-name" style="font-family:'Syne';">Profil</h2>
                <p id="user-email-display" style="opacity:0.5; font-size:0.8rem;"></p>
            </div>

            <div class="menu-item" onclick="alert('Messages')"><span>💬 Messagerie</span><span>❯</span></div>
            <div class="menu-item" onclick="alert('Dons')"><span>💎 Mes Dons</span><span>❯</span></div>
            <div class="menu-item" onclick="alert('Paramètres')">
