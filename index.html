<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo — La Plateforme Locale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6c63ff; --bg: #080810; --panel: #13131e;
            --text: #f0f0f8; --text-dim: #9090a8; --border: rgba(255,255,255,0.08);
            --radius: 20px; --font-scale: 1; --pfp-shape: 50%;
        }
        .light-mode { --bg: #f5f5fa; --panel: #ffffff; --text: #111111; --text-dim: #666666; --border: rgba(0,0,0,0.08); }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; font-size: calc(16px * var(--font-scale)); transition: 0.3s; }

        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; background: var(--bg); }

        /* HEADER */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Syne'; font-weight: 800; font-size: 1.6rem; background: linear-gradient(135deg, var(--accent), #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }

        /* SCREENS */
        .screen { flex: 1; display: none; flex-direction: column; padding: 10px 16px 100px; overflow-y: auto; scrollbar-width: none; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* CONSEIL & MASCOTTE */
        .mascot-area { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .fox-avatar { width: 45px; height: 45px; background: #ff9f43; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; box-shadow: 0 4px 10px rgba(255,159,67,0.3); }

        /* CARDS */
        .card { background: var(--panel); margin-bottom: 16px; border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .badge-local { background: var(--accent); color: white; font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; font-weight: 800; margin-bottom: 5px; display: inline-block; }
        .video-thumb { width: 100%; height: 200px; background: #000; border-radius: 12px; margin-top: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Syne'; font-weight: 700; color: #222; }

        /* MODALS (Chat & Search) */
        .modal { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; padding: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; }
        .bubble.them { background: var(--panel); align-self: flex-start; }
        .bubble.me { background: var(--accent); color: white; align-self: flex-end; }

        /* NAV BAR */
        .nav-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 75px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: var(--text-dim); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.6rem; transition: 0.2s; }
        .nav-item.active { color: var(--accent); transform: scale(1.1); }
        .btn-create { width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), #ff6584); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4); transform: translateY(-8px); cursor: pointer; }

        /* INPUTS */
        .swivo-input { background: rgba(0,0,0,0.1); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; width: 100%; outline: none; font-family: inherit; }
        .save-btn { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="app-shell">
        
        <div class="header">
            <div class="logo" onclick="location.reload()">Swivo</div>
            <div style="display:flex; gap:18px; cursor: pointer;">
                <span onclick="openSearch()">🔍</span>
                <span onclick="alert('Aucune nouvelle notification')">🔔</span>
            </div>
        </div>

        <div class="screen active" id="home">
            <div class="mascot-area">
                <div class="fox-avatar">🦊</div>
                <div style="font-size: 0.8rem; font-weight: 600;">Foxo : "Content de te voir !"</div>
            </div>

            <div class="card" onclick="openAdviceDetail()" style="border: 2px solid var(--accent);">
                <span class="badge-local" style="background: #ff9f43;">CONSEIL DU JOUR</span>
                <h3 id="tip-title" style="font-family: 'Syne'; margin: 5px 0;">...</h3>
                <p id="tip-summary" style="font-size: 0.85rem; opacity: 0.8; line-height: 1.4;"></p>
                <div style="margin-top: 10px; font-size: 0.7rem; color: var(--accent); font-weight: 800;">CLIQUE POUR LES EXERCICES PRATIQUES →</div>
            </div>

            <div id="feed-container">
                </div>
        </div>

        <div class="screen" id="messages">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Messages</h2>
            <div class="card" onclick="openChat('Hugo Décrypte', 'Salut ! Merci de suivre la chaîne.')">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div style="width:45px; height:45px; background:var(--accent); border-radius:var(--pfp-shape);"></div>
                    <div>
                        <div style="font-weight: 800;">Hugo Décrypte</div>
                        <div style="font-size: 0.8rem; opacity: 0.6;">Salut ! Merci de suivre la...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen" id="profile">
            <div style="text-align: center; padding: 20px 0;">
                <div style="width: 100px; height: 100px; background: var(--accent); border-radius: var(--pfp-shape); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 3rem;">👤</div>
                <input type="text" class="swivo-input" style="text-align: center; border:none; background:transparent; font-weight: 800; font-size: 1.3rem;" value="Utilisateur_Swivo">
            </div>

            <div class="card">
                <h4 style="font-family: 'Syne'; margin-bottom: 10px;">Ma Bio</h4>
                <textarea id="bio-text" class="swivo-input" style="height: 80px; resize: none;" placeholder="Écris ta bio ici..."></textarea>
                <button id="save-bio" class="save-btn" onclick="saveBio()">Sauvegarder</button>
            </div>

            <div class="card" style="border-color: #ff6584;">
                <h4 style="color: #ff6584">Soutenir le projet</h4>
                <button class="save-btn" style="background: #ff6584;" onclick="alert('Pub lancée...')">Regarder une pub 📺</button>
            </div>
        </div>

        <div class="screen" id="settings">
            <h2 style="font-family: 'Syne'; margin-bottom: 20px;">Paramètres</h2>
            <div class="card" onclick="document.body.classList.toggle('light-mode')">Changer le Mode (Sombre/Clair)</div>
            <div class="card">
                <p>Taille du texte</p>
                <input type="range" min="0.8" max="1.2" step="0.05" value="1" style="width:100%; margin-top:10px;" oninput="document.documentElement.style.setProperty('--font-scale', this.value)">
            </div>
        </div>

        <div id="chat-modal" class="modal">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom: 20px;">
                <span style="font-size: 1.5rem; cursor:pointer;" onclick="closeModal('chat-modal')">←</span>
                <h2 id="chat-name" style="font-family: 'Syne';">Nom</h2>
            </div>
            <div id="chat-content" class="chat-box"></div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="chat-input" class="swivo-input" placeholder="Votre message...">
                <button class="save-btn" style="width: auto; margin:0;" onclick="sendMessage()">Envoi</button>
            </div>
        </div>

        <div id="search-modal" class="modal">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom: 20px;">
                <span style="font-size: 1.5rem; cursor:pointer;" onclick="closeModal('search-modal')">←</span>
                <input type="text" id="search-input" class="swivo-input" placeholder="Chercher (ADN, Hugo, Diction...)" oninput="doSearch(this.value)">
            </div>
            <div id="search-results" style="overflow-y: auto;"></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('home', this)"><span>Flux</span></div>
            <div class="nav-item" onclick="switchTab('messages', this)"><span>Chat</span></div>
            <div class="btn-create" onclick="alert('Accès Caméra 1080p 60fps...')">+</div>
            <div class="nav-item" onclick="switchTab('profile', this)"><span>Profil</span></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><span>Infos</span></div>
        </div>

    </div>

    <script>
        const POSTS = [
            { user: "ADN_Anime", content: "Les pépites à voir ce mois-ci sur ADN ! 🐉 #Anime #ADN", tags: "adn anime manga", local: true },
            { user: "Hugo Décrypte", content: "L'actu du jour en 5 minutes. On débrief. 🌍", tags: "hugo decrypte actu news", local: false },
            { user: "Gypso", content: "Pourquoi le sommeil est ton meilleur allié. 😴", tags: "gypso sante bienetre", local: true },
            { user: "Crunchyroll_FR", content: "Le nouvel épisode est dispo ! 🎌", tags: "crunchyroll anime", local: false },
            { user: "HIDIVE", content: "Découvrez nos exclusivités. 📺", tags: "hidive anime", local: false }
        ];

        const ADVICES = [
            { title: "Où regarder ses Animés ?", summary: "1. ADN (Priorité locale) / 2. Crunchyroll / 3. HIDIVE", detail: "ADN est la plateforme française historique. Crunchyroll offre le plus gros catalogue mondial. HIDIVE est parfait pour les niches." },
            { title: "Maitriser sa Diction", summary: "Parlez avec un stylo entre les dents pour muscler votre articulation.", detail: "Exercice : Lisez 5 minutes par jour un texte complexe avec un stylo. Retirez-le ensuite, votre voix sera 2x plus claire." }
        ];

        let currentChat = [];

        window.onload = () => {
            const tip = ADVICES[new Date().getDate() % ADVICES.length];
            document.getElementById('tip-title').innerText = tip.title;
            document.getElementById('tip-summary').innerText = tip.summary;
            renderFeed(POSTS, 'feed-container');
        };

        function renderFeed(list, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="font-weight:800;">@${p.user}</span>
                            ${p.local ? '<span class="badge-local">RECOMMANDÉ</span>' : ''}
                        </div>
                        <p style="margin:10px 0; font-size:0.9rem;">${p.content}</p>
                        <div class="video-thumb">1080p 60fps PLAY</div>
                    </div>
                `;
            });
        }

        // NAVIGATION
        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        // CHAT LOGIC
        function openChat(name, firstMsg) {
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-modal').style.display = 'flex';
            currentChat = [{ type: 'them', text: firstMsg }];
            renderChat();
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            currentChat.push({ type: 'me', text: input.value });
            input.value = "";
            renderChat();
            // Réponse auto
            setTimeout(() => {
                currentChat.push({ type: 'them', text: "Bien reçu ! Je te réponds dès que possible. 👍" });
                renderChat();
            }, 1000);
        }

        function renderChat() {
            const box = document.getElementById('chat-content');
            box.innerHTML = currentChat.map(m => `<div class="bubble ${m.type}">${m.text}</div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        // RECHERCHE
        function openSearch() { document.getElementById('search-modal').style.display = 'flex'; }
        function doSearch(val) {
            if(!val) { document.getElementById('search-results').innerHTML = ""; return; }
            const filtered = POSTS.filter(p => p.tags.includes(val.toLowerCase()) || p.user.toLowerCase().includes(val.toLowerCase()));
            renderFeed(filtered, 'search-results');
        }

        // BIO & CONSEIL
        function saveBio() {
            const btn = document.getElementById('save-bio');
            btn.innerText = "Sauvegardé ! ✅";
            btn.style.background = "#43e97b";
            setTimeout(() => { btn.innerText = "Sauvegarder"; btn.style.background = "var(--accent)"; }, 2000);
        }

        function openAdviceDetail() {
            const tip = ADVICES[new Date().getDate() % ADVICES.length];
            alert(tip.title + "\n\n" + tip.detail);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
