<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo — Version Finale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6c63ff; --bg: #080810; --panel: #13131e;
            --text: #f0f0f8; --text-dim: #9090a8; --border: rgba(255,255,255,0.08);
            --radius: 20px; --font-scale: 1; --pfp-shape: 50%;
        }
        .light-mode { --bg: #f5f5fa; --panel: #ffffff; --text: #111111; --text-dim: #666666; --border: rgba(0,0,0,0.08); }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; font-size: calc(16px * var(--font-scale)); transition: background 0.3s; }

        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* HEADER & TABS */
        .header { padding: 15px 20px 5px; background: var(--bg); z-index: 10; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-family: 'Syne'; font-weight: 800; font-size: 1.6rem; background: linear-gradient(135deg, var(--accent), #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .feed-tabs { display: flex; gap: 20px; font-family: 'Syne'; font-weight: 700; font-size: 0.9rem; }
        .tab-item { opacity: 0.4; cursor: pointer; padding-bottom: 8px; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-item.active { opacity: 1; border-bottom-color: var(--accent); }

        /* SCREENS */
        .screen { flex: 1; display: none; flex-direction: column; padding: 15px 16px 100px; overflow-y: auto; scrollbar-width: none; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS */
        .card { background: var(--panel); margin-bottom: 16px; border-radius: var(--radius); padding: 18px; border: 1px solid var(--border); cursor: pointer; }
        .mascot-fox { width: 40px; height: 40px; background: #ff9f43; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(255,159,67,0.3); }

        /* MODALS (Chat / Search) */
        .modal { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; padding: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* DESIGN SYSTEM */
        .swivo-input { background: rgba(0,0,0,0.1); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; width: 100%; outline: none; font-family: inherit; margin: 5px 0; }
        .btn-accent { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .color-grid { display: flex; gap: 10px; margin: 10px 0; }
        .dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .dot.active { border-color: var(--text); transform: scale(1.1); }

        /* NAV BAR */
        .nav-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 75px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
        .nav-item { color: var(--text-dim); cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.6rem; }
        .nav-item.active { color: var(--accent); }
        .btn-plus { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #ff6584); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; transform: translateY(-8px); box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4); }
    </style>
</head>
<body>

    <div id="app-shell">
        
        <div class="header">
            <div class="header-top">
                <div class="logo">Swivo</div>
                <div style="display:flex; gap:18px;">
                    <span onclick="toggleModal('search-modal', true)">🔍</span>
                    <span onclick="alert('Rien de neuf ici !')">🔔</span>
                </div>
            </div>
            <div class="feed-tabs">
                <span class="tab-item active" onclick="switchFeed('pour-toi', this)">Pour toi</span>
                <span class="tab-item" onclick="switchFeed('abonnement', this)">Abonnements</span>
            </div>
        </div>

        <div class="screen active" id="home">
            <div class="card" onclick="openAdviceDetail()" style="border: 2px solid var(--accent);">
                <div class="mascot-fox">🦊</div>
                <span style="font-size: 0.65rem; font-weight: 900; color: var(--accent);">CONSEIL DU JOUR</span>
                <h3 id="tip-title" style="font-family: 'Syne'; margin: 5px 0;">Chargement...</h3>
                <p id="tip-summary" style="font-size: 0.85rem; opacity: 0.8;"></p>
                <div style="margin-top: 10px; font-size: 0.7rem; font-weight: 800; color: var(--accent);">LIRE LA SUITE →</div>
            </div>

            <div id="main-feed"></div>
        </div>

        <div class="screen" id="messages">
            <h2 style="font-family: 'Syne'; margin-bottom: 15px;">Messages</h2>
            <div class="card" onclick="openChat('Lucas (Graphiste)', 'Salut, tu as fini le logo ?')">
                <div style="display:flex; gap:12px; align-items:center;">
                    <div style="width:45px; height:45px; background:var(--accent); border-radius:var(--pfp-shape);"></div>
                    <div>
                        <div style="font-weight: 800;">Lucas (Graphiste)</div>
                        <div style="font-size: 0.8rem; opacity: 0.6;">Salut, tu as fini le logo ?</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="screen" id="profile">
            <div style="text-align: center; padding: 10px 0;">
                <div id="pfp-preview" style="width: 90px; height: 90px; background: var(--accent); border-radius: var(--pfp-shape); margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; transition: 0.3s;">👤</div>
                <input type="text" class="swivo-input" style="text-align:center; border:none; background:transparent; font-weight:800; font-size:1.2rem;" value="Apprenti_Swivo">
            </div>

            <div class="card">
                <h4 style="font-family: 'Syne'; margin-bottom: 5px;">Ma Bio</h4>
                <textarea id="bio-area" class="swivo-input" style="height:60px; resize:none;" placeholder="Parle-nous de toi..."></textarea>
                <button class="btn-accent" style="padding:8px; font-size:0.8rem;" onclick="saveBio(this)">Sauvegarder</button>
                <div style="display:flex; gap:10px; margin-top:15px; justify-content: center;">
                    <button class="swivo-input" style="width:auto; padding:5px 12px; font-size:0.7rem;" onclick="setShape('50%')">Rond</button>
                    <button class="swivo-input" style="width:auto; padding:5px 12px; font-size:0.7rem;" onclick="setShape('15%')">Carré</button>
                    <button class="swivo-input" style="width:auto; padding:5px 12px; font-size:0.7rem;" onclick="setShape('0% 50% 50% 50%')">Goutte</button>
                </div>
            </div>

            <div class="card" style="border-color: #ff6584;">
                <h4 style="color: #ff6584; margin-bottom: 10px;">Soutenir le projet</h4>
                <button class="btn-accent" style="background: #ff6584; margin-bottom: 10px;" onclick="alert('Pub lancée...')">Regarder une pub 📺</button>
                <button class="btn-accent" style="background: #0070ba;" onclick="alert('PayPal : contact@swivo.fr')">Faire un don PayPal 💎</button>
            </div>
        </div>

        <div class="screen" id="settings">
            <h2 style="font-family: 'Syne'; margin-bottom: 15px;">Personnalisation</h2>
            <div class="card">
                <p>Couleur préférée</p>
                <div class="color-grid">
                    <div class="dot active" style="background: #6c63ff" onclick="setAccent('#6c63ff', this)"></div>
                    <div class="dot" style="background: #ff6584" onclick="setAccent('#ff6584', this)"></div>
                    <div class="dot" style="background: #43e97b" onclick="setAccent('#43e97b', this)"></div>
                    <div class="dot" style="background: #f7971e" onclick="setAccent('#f7971e', this)"></div>
                    <div class="dot" style="background: #4facfe" onclick="setAccent('#4facfe', this)"></div>
                    <div class="dot" style="background: #9b59b6" onclick="setAccent('#9b59b6', this)"></div>
                </div>
            </div>
            <div class="card">
                <p>Taille du texte</p>
                <input type="range" min="0.8" max="1.2" step="0.05" value="1" style="width:100%; margin-top:10px;" oninput="document.documentElement.style.setProperty('--font-scale', this.value)">
            </div>
            <button class="btn-accent" onclick="document.body.classList.toggle('light-mode')">Passer en Mode Clair / Sombre</button>
        </div>

        <div id="search-modal" class="modal">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <span style="font-size:1.5rem;" onclick="toggleModal('search-modal', false)">←</span>
                <input type="text" id="search-in" class="swivo-input" placeholder="Rechercher ADN, Gypso, etc..." oninput="runSearch(this.value)">
            </div>
            <div id="search-results" style="overflow-y:auto;"></div>
        </div>

        <div id="chat-modal" class="modal">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                <span style="font-size:1.5rem;" onclick="toggleModal('chat-modal', false)">←</span>
                <h3 id="chat-title" style="font-family:'Syne'">Nom</h3>
            </div>
            <div id="chat-history" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input type="text" id="chat-in" class="swivo-input" placeholder="Ecrire...">
                <button class="btn-accent" style="width:auto;" onclick="pushMessage()">Envoyer</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('home', this)"><span>Flux</span></div>
            <div class="nav-item" onclick="switchTab('messages', this)"><span>Chat</span></div>
            <div class="btn-plus" onclick="alert('Caméra 1080p 60fps...')">+</div>
            <div class="nav-item" onclick="switchTab('profile', this)"><span>Profil</span></div>
            <div class="nav-item" onclick="switchTab('settings', this)"><span>Infos</span></div>
        </div>

    </div>

    <script>
        const DATA = [
            { user: "ADN_Officiel", text: "Le meilleur catalogue d'animés est ici. 🐉 #ADN #Streaming", tags: "adn anime manga", local: true },
            { user: "Gypso", text: "Apprendre à mieux dormir pour mieux réussir. 😴", tags: "gypso conseils", local: true },
            { user: "Hugo Décrypte", text: "Résumé de l'actualité en 5 minutes. 🌍", tags: "hugo actu", local: false },
            { user: "Crunchyroll", text: "Nouvelle saison dispo maintenant ! 🎌", tags: "crunchyroll anime", local: false }
        ];

        const TIPS = [
            { title: "Regarder ses Animés", sum: "ADN est le meilleur choix global. Crunchyroll et HIDIVE suivent.", detail: "ADN propose un catalogue français ultra-complet. Crunchyroll est le géant mondial. HIDIVE est top pour les séries plus rares." },
            { title: "Parler comme un Pro", sum: "Utilise la technique du stylo pour articuler.", detail: "Mets un stylo entre les dents et lis un texte. Ton articulation sera parfaite après 2 min." }
        ];

        window.onload = () => {
            const t = TIPS[new Date().getDate() % TIPS.length];
            document.getElementById('tip-title').textContent = t.title;
            document.getElementById('tip-summary').textContent = t.sum;
            renderFeed(DATA, 'main-feed');
        };

        function renderFeed(list, id) {
            const c = document.getElementById(id); c.innerHTML = "";
            list.sort((a,b) => b.local - a.local).forEach(p => {
                c.innerHTML += `<div class="card"><div style="display:flex;justify-content:space-between"><b>@${p.user}</b>${p.local?'<small style="color:var(--accent)">LOCAL</small>':''}</div><p style="font-size:0.9rem;margin:10px 0">${p.text}</p><div style="width:100%;height:180px;background:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#444">1080p 60fps</div></div>`;
            });
        }

        function switchTab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function switchFeed(type, el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderFeed(type === 'pour-toi' ? DATA : DATA.filter(d => d.local), 'main-feed');
        }

        function saveBio(btn) {
            btn.textContent = "Sauvé ! ✅"; btn.style.background = "#43e97b";
            setTimeout(() => { btn.textContent = "Sauvegarder"; btn.style.background = "var(--accent)"; }, 1500);
        }

        function setAccent(c, el) {
            document.documentElement.style.setProperty('--accent', c);
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active')); el.classList.add('active');
        }

        function setShape(s) { document.documentElement.style.setProperty('--pfp-shape', s); }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

        function runSearch(v) {
            const res = DATA.filter(d => d.tags.includes(v.toLowerCase()) || d.user.toLowerCase().includes(v.toLowerCase()));
            renderFeed(v ? res : [], 'search-results');
        }

        let msgs = [];
        function openChat(n, m) {
            document.getElementById('chat-title').textContent = n;
            msgs = [{t:'them', txt:m}]; toggleModal('chat-modal', true); renderChat();
        }

        function pushMessage() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            msgs.push({t:'me', txt:i.value}); i.value = ""; renderChat();
            setTimeout(() => { msgs.push({t:'them', txt:'Entendu !'}); renderChat(); }, 800);
        }

        function renderChat() {
            const h = document.getElementById('chat-history');
            h.innerHTML = msgs.map(m => `<div style="padding:10px; border-radius:15px; max-width:80%; font-size:0.9rem; background:${m.t==='me'?'var(--accent)':'var(--panel)'}; align-self:${m.t==='me'?'flex-end':'flex-start'}">${m.txt}</div>`).join('');
            h.scrollTop = h.scrollHeight;
        }

        function openAdviceDetail() {
            const t = TIPS[new Date().getDate() % TIPS.length];
            alert(t.title + "\n\n" + t.detail);
        }
    </script>
</body>
</html>
