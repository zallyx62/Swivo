<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo - Full Version</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #6c63ff; --bg: #080810; --panel: #13131e; --text: #f0f0f8; --border: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* AUTH */
        #auth-overlay { position: absolute; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; text-align: center; }
        .logo-luxe { font-family: 'Syne'; font-size: 3.5rem; background: linear-gradient(135deg, var(--accent), #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .sw-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 14px; margin-top: 10px; outline: none; }
        .sw-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        /* UI */
        .header { padding: 15px 20px; display: none; border-bottom: 1px solid var(--border); justify-content: space-between; align-items: center; }
        .screen { flex: 1; display: none; flex-direction: column; padding: 15px 16px 100px; overflow-y: auto; }
        .screen.active { display: flex; }
        .card { background: var(--panel); margin-bottom: 15px; border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        .nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: var(--panel); border-top: 1px solid var(--border); display: none; align-items: center; justify-content: space-around; font-size: 1.5rem; }
        .menu-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        
        .top-icons { display: flex; gap: 15px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="app-shell">
        <div id="auth-overlay">
            <h1 class="logo-luxe">Swivo</h1>
            <input type="email" id="email" class="sw-input" placeholder="Email">
            <input type="password" id="pass" class="sw-input" placeholder="Mot de passe">
            <button class="sw-btn" id="btn-login">Se connecter</button>
            <button class="sw-btn" id="btn-signup" style="background:transparent; border:1px solid var(--accent);">Créer un profil</button>
            <p style="color:var(--accent); font-size:0.8rem; margin-top:20px; cursor:pointer;" onclick="alert('Lien de récupération envoyé !')">Mot de passe oublié ?</p>
        </div>

        <div id="app-header" class="header">
            <div style="font-family:'Syne'; color:var(--accent); font-size:1.5rem;">Swivo</div>
            <div class="top-icons">
                <span>🔍</span>
                <span>🔔</span>
            </div>
        </div>
        
        <div id="feed" class="screen">
            <div style="display:flex; gap:20px; margin-bottom:20px; font-weight:700;">
                <span style="border-bottom: 2px solid var(--accent)">Pour toi</span>
                <span style="opacity:0.5">Abonnements</span>
            </div>
            
            <div class="card">
                <p style="font-weight:800; color:var(--accent); margin-bottom:10px;">CONSEIL DU JOUR 💡</p>
                <p style="font-size:0.9rem;">"Le succès, c'est d'aller d'échec en échec sans perdre son enthousiasme."</p>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-weight:bold;">LIVE EN COURS 🔴</span>
                    <button style="background:var(--accent); border:none; padding:5px 10px; border-radius:8px; color:white; font-size:0.7rem;">REJOINDRE</button>
                </div>
                <div style="width:100%; height:200px; background:#000; border-radius:15px; display:flex; align-items:center; justify-content:center;">VIDÉO TEST</div>
            </div>
        </div>

        <div id="profile" class="screen">
            <div style="text-align:center; margin-bottom:25px;">
                <div style="width:80px; height:80px; background:linear-gradient(45deg, var(--accent), #ff6584); border-radius:50%; margin:0 auto 10px;"></div>
                <h2 id="user-tag" style="font-family:'Syne';">Profil</h2>
            </div>
            <div class="menu-item" onclick="alert('Messagerie')"><span>💬 Messagerie</span><span>❯</span></div>
            <div class="menu-item" onclick="alert('Dons')"><span>💎 Mes Dons</span><span>❯</span></div>
            <div class="menu-item" onclick="alert('Paramètres')"><span>⚙️ Paramètres</span><span>❯</span></div>
            <div class="menu-item" style="color:#ff6584;" onclick="logout()"><span>🚪 Déconnexion</span></div>
        </div>

        <nav id="app-nav" class="nav">
            <div onclick="showPage('feed')" style="cursor:pointer">🏠</div>
            <div style="background:var(--accent); width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.2rem; cursor:pointer">+</div>
            <div onclick="showPage('profile')" style="cursor:pointer">👤</div>
        </nav>
    </div>

    <script>
        // CONFIGURATION
        const S_URL = 'https://hpmjiqktsriqujiimyda.supabase.co';
        const S_KEY = 'sb_publishable_eVAhiO5Y2QPUqZB-mTuZ6g_TcWoSfJy';
        
        let supabaseClient;

        // On initialise quand le DOM est prêt
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof supabase === 'undefined') {
                console.error("Supabase n'est pas chargé");
                return;
            }
            
            supabaseClient = supabase.createClient(S_URL, S_KEY);

            // AUTO-LOGIN SI SESSION EXISTE
            supabaseClient.auth.getSession().then(({ data }) => {
                if (data.session) unlockApp(data.session.user.email);
            });

            // LOGIN
            document.getElementById('btn-login').onclick = async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                if(!e || !p) return alert("Remplis les cases !");
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
                if (error) alert(error.message);
                else unlockApp(data.user.email);
            };

            // SIGNUP
            document.getElementById('btn-signup').onclick = async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                if(!e || !p) return alert("Remplis les cases !");
                
                const { data, error } = await supabaseClient.auth.signUp({ email: e, password: p });
                if (error) alert(error.message);
                else alert("Compte créé ! Connecte-toi.");
            };
        });

        function unlockApp(email) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('feed').classList.add('active');
            document.getElementById('user-tag').innerText = email.split('@')[0];
        }

        function showPage(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
