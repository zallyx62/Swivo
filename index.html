<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo App — Intégrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --bg: #080810;
            --panel-bg: #13131e;
            --card-bg: #13131e;
            --text: #f0f0f8;
            --accent-green: #43e97b;
            --font-size-base: 0.85rem;
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- PANNEAU DE PERSONNALISATION --- */
        #custom-panel {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h1.brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 1.5px;
            margin: 20px 0 10px;
        }

        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .opt-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .opt-btn.active { border-color: var(--primary); background: rgba(108,99,255,0.15); }

        .color-dots { display: flex; flex-wrap: wrap; gap: 8px; }
        .dot { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .dot.active { border-color: white; transform: scale(1.1); }

        /* --- SIMULATEUR TÉLÉPHONE --- */
        #app-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone {
            width: 375px;
            height: 750px;
            background: var(--bg);
            border: 8px solid #1a1a1a;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* APP CONTENT */
        .app-header { padding: 40px 20px 10px; text-align: center; }
        .app-logo { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .app-tabs { display: flex; justify-content: space-around; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--primary); }

        .app-feed { flex: 1; overflow-y: auto; padding: 16px; scrollbar-width: none; }
        .app-feed::-webkit-scrollbar { display: none; }

        /* CARDS */
        .card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .card-tag { color: var(--accent-green); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 8px; }
        .card-desc { font-size: var(--font-size-base); opacity: 0.8; line-height: 1.4; }
