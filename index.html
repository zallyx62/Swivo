<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo — L'Expérience Totale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff; --secondary: #ff6584; --bg: #080810;
            --card: #13131e; --text: #f0f0f8; --accent: #43e97b;
            --gradient: linear-gradient(135deg, #6c63ff, #ff6584);
            --font-size: 0.95rem;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #000; color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- CONFIGURATEUR (STYLE DRAWER) --- */
        #config-drawer {
            position: fixed; top: 0; left: 0; width: 300px; height: 100%; background: #0f0f1a;
            z-index: 4000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px; border-right: 1px solid var(--primary);
        }
        #config-drawer.open { transform: translateX(0); }
        .cfg-label { font-family: 'Syne'; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; margin: 15px 0 8px; display: block; }
        .btn-ui { background: #1a1a2e; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; width: 100%; margin-bottom: 8px; cursor: pointer; font-size: 0.8rem; }
        .btn-ui.active { background: var(--primary); border-color: var(--primary); }

        /* --- MOBILE FRAME --- */
        #app-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg); position: relative; }
        #phone {
            width: 375px; height: 100%; max-height: 812px; background: var(--bg);
            border: 8px solid #1a1a1a; border-radius: 45px; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header { padding: 50px 20px 10px; text-align: center; background: var(--bg); }
        .logo { font-family: 'Syne'; font-size: 2.2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: 0.3s; }
        .tabs { display: flex; justify-content: center; gap: 20px; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding-bottom: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--primary); }

        /* CONTENT */
        #main-feed { flex: 1; overflow-y: auto; padding: 20px 20px 120px; scrollbar-width: none; }
        #main-feed::-webkit-scrollbar { display: none; }

        /* CARDS */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .tag { color: var(--accent); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; background: rgba(67,233,123,0.1); padding: 4px 10px; border-radius: 8px; }
        .card h3 { font-family: 'Syne'; font-size: 1.3rem; margin: 10px 0; }
        .card p { font-size: var(--font-size); opacity: 0.7; line-height: 1.5; }

        /* MASCOTTE */
        .mascot-box { background: rgba(108,99,255,0.1); border: 1px solid var(--primary); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .fox-icon { font-size: 2.2rem; }

        /* NAVBAR */
        nav { position: absolute; bottom: 0; width: 100%; height: 90px; background: rgba(8,8,16,0.98); display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-icon { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-icon.active { opacity: 1; color: var(--primary); }

        /* MODALS */
        #full-view { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 5000; padding: 60px 25px; }

        /* FLOATING ACTION */
        #cfg-btn { position: fixed; right: 20px; bottom: 110px; width: 55px; height: 55px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; z-index: 3000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); cursor: pointer; }

        @media (max-width: 850px) {
            #phone { width: 100vw; height: 100vh; max-height: none; border: none; border-radius: 0; }
        }
    </style>
</head>

        <button class="btn-ui" onclick="setNav('top', this)">Haut de l'écran</button>
