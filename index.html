<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo Fix</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6c63ff; --bg: #080810; --panel: #13131e; --text: #f0f0f8; --border: rgba(255,255,255,0.08); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 450px; height: 100%; position: relative; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        /* AUTH SCREEN */
        .auth-container { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .logo { font-family: 'Syne'; font-size: 3.5rem; background: linear-gradient(135deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .sw-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 14px; margin-bottom: 10px; outline: none; }
        .sw-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* APP INTERFACE (Cachée au début) */
        #main-app { display: none; flex: 1; flex-direction: column; height: 100%; }
        .header { padding: 20px; font-family: 'Syne'; color: var(--accent); font-size: 1.5rem; border-bottom: 1px solid var(--border); }
        .feed { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .nav { height: 75px; background: var(--panel); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="app">
        <div id="auth-ui" class="auth-container">
            <h1 class="logo">Swivo</h1>
            <input type="email" id="user-email" class="sw-input" placeholder="Email">
            <input type="password" id="user-pass" class="sw-input" placeholder="Mot de passe">
            <button class="sw-btn" onclick="tenterConnexion()">Connexion</button>
            <button class="sw-btn" style="background:transparent; border:1px solid var(--accent);" onclick="tenterInscription()">Créer un compte</button>
            <p style="margin-top:20px; color:var(--accent); cursor:pointer;" onclick="alert('Lien envoyé !')">Mot de passe oublié ?</p>
        </div>

        <div id="main-app">
            <div class="header">Swivo</div>
            <div class="feed">
                <div class="card">
                    <h2 style="font-family:'Syne';">Profil de <span id="username">...</span></h2>
                    <p style="opacity:0.6; margin-top:10px;">Ton flux est prêt.</p>
                </div>
                <button class="sw-btn" onclick="location.reload()">Déconnexion</button>
            </div>
            <nav class="nav"><span>🏠</span><span>👤</span></nav>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const S_URL = 'https://hpmjiqktsriqujiimyda.supabase.co';
        const S_KEY = 'sb_publishable_eVAhiO5Y2QPUqZB-mTuZ6g_TcWoSfJy';
        let sb;

        // On initialise avec sécurité
        window.onload = () => {
            try {
                if (typeof supabase === 'undefined') {
                    alert("Erreur : La librairie Supabase ne s'est pas chargée. Vérifie ta connexion.");
                } else {
                    sb = supabase.createClient(S_URL, S_KEY);
                }
            } catch (e) { console.error(e); }
        };

        async function tenterInscription() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            if(!email || !pass) { alert("Remplis les cases !"); return; }

            const { data, error } = await sb.auth.signUp({ email, password: pass });
            if (error) alert("Erreur : " + error.message);
            else alert("Compte créé ! Vérifie tes emails.");
        }

        async function tenterConnexion() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            if(!email || !pass) { alert("Remplis les cases !"); return; }

            const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
            if (error) {
                alert("Erreur : " + error.message);
            } else {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('username').innerText = email.split('@')[0];
            }
        }
    </script>
</body>
</html>
