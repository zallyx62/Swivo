<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo App — Expérience Totale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --bg: #080810;
            --card: #13131e;
            --text: #f0f0f8;
            --accent: #43e97b;
            --gradient: linear-gradient(135deg, #6c63ff 0%, #ff6584 100%);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: #000; 
            color: var(--text); 
            display: flex; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }

        /* --- CONFIGURATION (CACHÉ SUR MOBILE) --- */
        #config-side {
            width: 300px; background: #0f0f1a; border-right: 1px solid #222;
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
            z-index: 200;
        }

        .cfg-label { font-family: 'Syne'; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ui { background: #1a1a2e; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .btn-ui.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(108,99,255,0.3); }

        /* --- VIEWPORT PRINCIPAL --- */
        #main-view { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg); position: relative; }

        /* LE TÉLÉPHONE */
        #phone {
            width: 375px; height: 780px; background: var(--bg);
            border: 10px solid #1a1a1a; border-radius: 45px;
            position: relative; display: flex; flex-direction: column;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* BARRE DE STATUT (Design iPhone) */
        .status-bar { height: 40px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; font-size: 0.75rem; font-weight: bold; }

        /* HEADER & TABS */
        header { padding: 10px 0; text-align: center; }
        .logo { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; justify-content: center; gap: 25px; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding-bottom: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0.4; cursor: pointer; position: relative; }
        .tab.active { opacity: 1; color: #fff; }
        .tab.active::after { content:''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--primary); border-radius: 10px; }

        /* ZONE DE CONTENU DYNAMIQUE */
        #app-scroller {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 18px;
            padding-bottom: 100px;
            scrollbar-width: none;
        }
        #app-scroller::-webkit-scrollbar { display: none; }

        /* CARTES STYLE VIDEO */
        .card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.08);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .chip { padding: 4px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; background: rgba(67,233,123,0.1); color: var(--accent); }
        
        .card h3 { font-family: 'Syne'; font-size: 1.25rem; margin-bottom: 10px; line-height: 1.2; }
        .card p { font-size: 0.9rem; opacity: 0.7; line-height: 1.5; margin-bottom: 15px; }

        .btn-action { background: var(--gradient); border: none; padding: 12px; border-radius: 15px; color: white; font-weight: 700; width: 100%; cursor: pointer; }

        /* NAVIGATION BASSE */
        #navbar {
            position: absolute; bottom: 0; width: 100%; height: 85px;
            background: rgba(13,13,25,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-icon { font-size: 1.5rem; opacity: 0.3; cursor: pointer; transition: 0.3s; }
        .nav-icon.active { opacity: 1; color: var(--primary); transform: scale(1.1); }
        .nav-center { background: var(--gradient); width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center; color: white; margin-top: -25px; box-shadow: 0 8px 20px rgba(108,99,255,0.4); }

        /* RESPONSIVE MOBILE */
        @media (max-width: 800px) {
            #config-side { display: none; }
            #phone { width: 100vw; height: 100vh; border: none; border-radius: 0; }
            .status-bar { display: none; }
        }
    </style>
</head>
<body>

    <div id="config-side">
        <h2 style="font-family:'Syne'; margin-bottom:10px;">Swivo Custom</h2>
        
        <div class="cfg-section">
            <p class="cfg-label">Couleurs du thème</p>
            <div class="btn-grid">
                <button class="btn-ui active" onclick="setTheme('#6c63ff', '#ff6584', this)">Swivo Original</button>
                <button class="btn-ui" onclick="setTheme('#00d2ff', '#3a7bd5', this)">Océan Bleu</button>
                <button class="btn-ui" onclick="setTheme('#f9d423', '#ff4e50', this)">Sunset</button>
                <button class="btn-ui" onclick="setTheme('#43e97b', '#38f9d7', this)">Émeraude</button>
            </div>
        </div>

        <div class="cfg-section">
            <p class="cfg-label">Position du Menu</p>
            <div class="btn-grid">
                <button class="btn-ui active" onclick="setNavPos('bottom', this)">En Bas</button>
                <button class="btn-ui" onclick="setNavPos('top', this)">En Haut</button>
            </div>
        </div>
    </div>

    <div id="main-view">
        <div id="phone">
            <div class="status-bar">
                <span>9:41</span>
                <span>📶 🔋</span>
            </div>

            <header id="app-header">
                <div class="logo">Swivo</div>
                <div class="tabs">
                    <div class="tab active" onclick="changeTab('pourtoi', this)">Pour toi</div>
                    <div class="tab" onclick="changeTab('suivis', this)">Suivis</div>
                    <div class="tab" onclick="changeTab('live', this)">Live</div>
                </div>
            </header>

            <div id="app-scroller">
                </div>

            <nav id="navbar">
                <div class="nav-icon active" onclick="navTo('home', this)">🏠</div>
                <div class="nav-icon" onclick="navTo('search', this)">🔍</div>
                <div class="nav-center" onclick="navTo('add', this)">+</div>
                <div class="nav-icon" onclick="navTo('chat', this)">💬</div>
                <div class="nav-icon" onclick="navTo('profile', this)">👤</div>
            </nav>
        </div>
    </div>

    <script>
        const DATA = {
            pourtoi: [
                { tag: "Finance", title: "Règle du 50/30/20", desc: "La clé pour ne plus jamais finir à découvert. 50% Besoins, 30% Envies, 20% Épargne." },
                { tag: "Numérique", title: "Mots de passe sécurisés", desc: "Utilise 'Bitwarden' pour ne plus jamais oublier tes accès tout en restant protégé." },
                { tag: "Santé", title: "Mieux dormir", desc: "Éteins les écrans 30min avant de dormir. Ton cerveau te remerciera demain." },
                { tag: "Cuisine", title: "Pasta 2 minutes", desc: "Rapide, sain et économique. Le guide ultime du repas étudiant." }
            ],
            live: [
                { tag: "Direct", title: "Parlons d'Orientation", desc: "Pose toutes tes questions sur Parcoursup en direct avec @CoachSwivo." },
                { tag: "Gaming", title: "Tournoi FIFA 24", desc: "Inscriptions ouvertes pour le tournoi de ce soir. 50€ à gagner !" }
            ],
            search: [
                { tag: "Recherche", title: "Trouver un serveur", desc: "Tape le nom d'une ville ou d'une passion pour rejoindre ta communauté." }
            ],
            chat: [
                { tag: "Messages", title: "Lucas", desc: "Hé ! Tu as vu le dernier conseil sur le budget ?" },
                { tag: "Messages", title: "Support Swivo", desc: "Bienvenue ! Comment peut-on t'aider aujourd'hui ?" }
            ],
            profile: [
                { tag: "Niveau 1", title: "Ton Profil", desc: "Inscrit depuis aujourd'hui. Participe pour gagner des badges !" }
            ]
        };

        // --- MOTEUR DE NAVIGATION ---
        function render(type) {
            const container = document.getElementById('app-scroller');
            container.innerHTML = ''; // On vide
            
            const items = DATA[type] || DATA.pourtoi;
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header"><span class="chip">${item.tag}</span></div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <button class="btn-action" onclick="alert('Action enregistrée !')">En savoir plus</button>
                `;
                container.appendChild(card);
            });
            container.scrollTop = 0;
        }

        function changeTab(tabName, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render(tabName);
        }

        function navTo(page, el) {
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            if(el.classList.contains('nav-icon')) el.classList.add('active');
            render(page);
        }

        // --- MOTEUR DE PERSONNALISATION ---
        function setTheme(c1, c2, el) {
            document.documentElement.style.setProperty('--primary', c1);
            document.documentElement.style.setProperty('--secondary', c2);
            document.documentElement.style.setProperty('--gradient', `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`);
            
            document.querySelectorAll('#config-side .btn-ui').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function setNavPos(pos, el) {
            const nav = document.getElementById('navbar');
            const phone = document.getElementById('phone');
            const header = document.getElementById('app-header');

            document.querySelectorAll('.cfg-section:last-child .btn-ui').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            if(pos === 'top') {
                phone.insertBefore(nav, header);
                nav.style.position = "relative";
                nav.style.bottom = "auto";
                nav.style.borderTop = "none";
                nav.style.borderBottom = "1px solid rgba(255,255,255,0.05)";
            } else {
                phone.appendChild(nav);
                nav.style.position = "absolute";
                nav.style.bottom = "0";
                nav.style.borderBottom = "none";
                nav.style.borderTop = "1px solid rgba(255,255,255,0.05)";
            }
        }

        // Lancement initial
        window.onload = () => render('pourtoi');

    </script>
</body>
</html>
