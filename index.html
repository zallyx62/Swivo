<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Swivo - L'app pour tous</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary: #a855f7;
            --bg: #0a0a0a;
            --card: #16161a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Empêche le défilement rebondissant sur iOS */
            overflow: hidden; 
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .slogan {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--card);
            border: 1px solid #2d2d35;
            padding: 2rem;
            border-radius: 24px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        button {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="logo">Swivo</div>
    <p class="slogan">L'app pour tous, par tous.</p>

    <div class="card">
        <h2>Prêt à découvrir Swivo ? Appuie sur le bouton ci-dessous !</h2>
        <button onclick="nextStep()">Suivant</button>
    </div>

    <script>
        function nextStep() {
            alert("Bienvenue sur Swivo ! Le reste arrive bientôt.");
        }
    </script>
</body>
</html>
