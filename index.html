<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo — L'App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --secondary: #ff6584;
            --bg: #080810;
            --card: #13131e;
            --text: #f0f0f8;
            --accent-green: #43e97b;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px; /* Espace pour la barre du bas */
        }

        /* HEADER FIXE */
        header {
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            background: rgba(8, 8, 16, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* FEED CONTENU */
        .content { padding: 16px; flex: 1; }

        .status-badge {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; box-shadow: 0 0 8px var(--secondary); }

        /* CARTE STYLE SWIVO */
        .tip-card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            transition: all 0.3s ease;
        }

        .tag {
            color: var(--accent-green);
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .tip-card h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .tip-card p {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .next-btn {
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            width: 100%;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* BARRE DE NAVIGATION MOBILE */
        .nav-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(13, 13, 30, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 10px 30px;
            border-top: 1px
