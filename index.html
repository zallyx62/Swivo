<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swivo Fix Final</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --accent: #6c63ff; --bg: #080810; --text: #f0f0f8; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: #13131e; padding: 30px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #202030; color: white; outline: none; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #app-content { display: none; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-card">
        <h1 style="color:var(--accent); font-family: sans-serif;">Swivo</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button id="btn-login">Se connecter</button>
        <button id="btn-signup" style="background:transparent; border: 1px solid var(--accent)">S'inscrire</button>
    </div>

    <div id="app-content">
        <h1>Bienvenue sur Swivo !</h1>
        <p id="user-display"></p>
        <button onclick="location.reload()" style="background:#ff6584">Déconnexion</button>
    </div>

    <script>
        // On attend que la page soit totalement chargée pour lancer le script
        window.addEventListener('DOMContentLoaded', () => {
            
            const S_URL = 'https://hpmjiqktsriqujiimyda.supabase.co';
            const S_KEY = 'sb_publishable_eVAhiO5Y2QPUqZB-mTuZ6g_TcWoSfJy';

            // VERIFICATION SI SUPABASE EST BIEN CHARGÉ
            if (typeof supabase === 'undefined') {
                alert("ERREUR : La bibliothèque Supabase ne s'est pas chargée. Vérifie ta connexion internet ou le lien du script.");
                return;
            }

            // INITIALISATION
            const client = supabase.createClient(S_URL, S_KEY);
            console.log("Supabase est prêt !");

            // CONNEXION
            document.getElementById('btn-login').onclick = async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                
                const { data, error } = await client.auth.signInWithPassword({ email: e, password: p });
                
                if (error) alert("Erreur : " + error.message);
                else showApp(data.user.email);
            };

            // INSCRIPTION
            document.getElementById('btn-signup').onclick = async () => {
                const e = document.getElementById('email').value;
                const p = document.getElementById('pass').value;
                
                const { data, error } = await client.auth.signUp({ email: e, password: p });
                
                if (error) alert("Erreur : " + error.message);
                else alert("Inscription réussie ! Connecte-toi.");
            };

            function showApp(email) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                document.getElementById('user-display').innerText = "Utilisateur : " + email;
            }
        });
    </script>
</body>
</html>
