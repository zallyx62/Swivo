<script>
    console.log("Script chargé !");

    // --- CONFIGURATION ---
    // VERIFIE BIEN QU'IL N'Y A PAS DE 'T' AVANT 'sb_publishable'
    const S_URL = 'https://hpmjiqktsriqujiimyda.supabase.co';
    const S_KEY = 'sb_publishable_eVAhiO5Y2QPUqZB-mTuZ6g_TcWoSfJy'; 
    
    let supabase;

    try {
        supabase = window.supabase.createClient(S_URL, S_KEY);
        console.log("Supabase initialisé !");
    } catch (err) {
        alert("Erreur d'initialisation Supabase : " + err.message);
    }

    // --- CONNEXION ---
    document.getElementById('btn-login').onclick = async () => {
        console.log("Clic sur Connexion");
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        
        if(!e || !p) return alert("Remplis les cases !");
        
        const { data, error } = await supabase.auth.signInWithPassword({ email: e, password: p });
        
        if (error) {
            alert("Erreur Supabase : " + error.message);
        } else {
            alert("Succès ! Connexion en cours...");
            unlockApp(data.user.email);
        }
    };

    // --- INSCRIPTION ---
    document.getElementById('btn-signup').onclick = async () => {
        console.log("Clic sur Inscription");
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        
        if(!e || !p) return alert("Remplis les cases !");
        
        const { data, error } = await supabase.auth.signUp({ email: e, password: p });
        
        if (error) {
            alert("Erreur Inscription : " + error.message);
        } else {
            alert("Compte créé ! Vérifie tes mails (ou connecte-toi direct si t'as coupé l'option)");
        }
    };

    function unlockApp(email) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('app-header').style.display = 'block';
        document.getElementById('app-nav').style.display = 'flex';
        document.getElementById('feed').classList.add('active');
        document.getElementById('user-tag').innerText = email.split('@')[0];
    }

    function showPage(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
