<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6c63ff;
            --bg: #080810;
            --panel: #13131e;
            --text: #f0f0f8;
            --text-dim: #9090a8;
            --border: rgba(255,255,255,0.08);
            --radius: 20px;
        }

        /* RESET & FULLSCREEN */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden; /* Empêche le rebond Safari */
        }

        /* APP CONTAINER - ADAPTATIF TOUT ÉCRAN */
        #app-shell {
            width: 100%;
            max-width: 500px; /* Limite sur PC pour garder le look mobile */
            height: 100%;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* SCREENS SYSTEM */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 16px 100px; /* Padding bas pour la nav bar */
            scrollbar-width: none;
        }
        .screen::-webkit-scrollbar { display: none; }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER FIXED */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            z-index: 10;
        }
        .header h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; }
        .accent-text { background: linear-gradient(135deg, var(--accent), #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* CARDS */
        .card {
            background: var(--panel);
            margin-bottom: 16px;
            border-radius: var(--radius);
            padding: 18px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.98); }

        /* DAILY ADVICE (AUTOMATIQUE) */
        .daily-box {
            background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,101,132,0.15));
            border: 1px solid var(--accent);
            position: relative;
            overflow: hidden;
        }
        .daily-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; display: block; }
        .daily-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 6px; }
        
        /* FEED ITEMS */
        .post-user { font-weight: 700; font-family: 'Syne', sans-serif; font-size: 0.95rem; }
        .post-handle { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 10px; display: block; }
        .post-content { font-size: 0.9rem; color: #d0d0d8; line-height: 1.4; }

        /* SUPPORT SECTION */
        .support-card {
            background: #1a1a2e;
            border: 1px dashed var(--accent);
            text-align: center;
            margin-top: 20px;
        }
        .support-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            margin-top: 12px;
            width: 100%;
            cursor: pointer;
        }

        /* NAVIGATION BAR (FIXED BOTTOM) */
        .nav-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(8, 8, 16, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
            z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-dim); font-size: 0.6rem; cursor: pointer;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; }

        /* SETTINGS OPTIONS */
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }
        
        /* MASCOTTE */
        .mascot-bubble {
            display: flex; gap: 10px; align-items: center; margin: 20px 0;
        }
        .mascot-avatar { width: 40px; height: 40px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

    </style>
</head>

    <div id="app-shell">
        
        <div class="header">
            <h2><span class="accent-text">Swivo</span></h2>
            <div id="date-display" style="font-size: 0.8rem; font-weight: 600; color: var(--text-dim);"></div>
        </div>

        <div class="screen active" id="home">
            
            <div class="card daily-box">
                <span class="daily-tag">Conseil du moment</span>
                <div class="daily-title" id="daily-title">Chargement...</div>
