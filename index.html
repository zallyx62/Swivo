<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff; --secondary: #ff6584; --bg: #080810;
            --card: #13131e; --text: #f0f0f8; --accent: #43e97b;
            --gradient: linear-gradient(135deg, #6c63ff, #ff6584);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- CONFIGURATEUR --- */
        #config-drawer {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%; background: #0f0f1a;
            z-index: 5000; transform: translateX(-100%); transition: 0.3s ease;
            padding: 30px; border-right: 1px solid var(--primary);
        }
        #config-drawer.open { transform: translateX(0); }
        .cfg-label { font-family: 'Syne'; font-size: 0.7rem; color: var(--primary); text-transform: uppercase; margin: 15px 0 8px; display: block; }
        .btn-ui { background: #1a1a2e; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; width: 100%; margin-bottom: 8px; cursor: pointer; }

        /* --- STRUCTURE --- */
        #phone {
            flex: 1; width: 100%; max-width: 450px; margin: 0 auto;
            position: relative; display: flex; flex-direction: column; background: var(--bg);
        }

        header { padding: 50px 20px 10px; text-align: center; }
        .logo { font-family: 'Syne'; font-size: 2.2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .tabs { display: flex; justify-content: center; gap: 20px; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding-bottom: 10px; font-size: 0.85rem; font-weight: 700; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--primary); }

        /* CONTENU */
        #main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .tag { color: var(--accent); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        
        /* MASCOTTE */
        .mascot-box { background: rgba(108,99,255,0.1); border: 1px solid var(--primary); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }

        /* NAVIGATION */
        nav { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(8,8,16,0.98); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-icon { font-size: 1.5rem; opacity: 0.3; cursor: pointer; }
        .nav-icon.active { opacity: 1; color: var(--primary); }

        /* BOUTONS */
        #cfg-btn { position: fixed; right: 20px; bottom: 100px; width: 50px; height: 50px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 4000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 6000; padding: 60px 25px; }
    </style>
</head>
<body>

    <div id="cfg-btn" onclick="toggleCfg()">⚙️</div>

    <div id="config-drawer">
        <h2 style="font-family:'Syne'; color:white;">Réglages</h2>
        <span class="cfg-label">Position Nav</span>
        <button class="btn-ui" onclick="setNav('top')">Haut</button>
        <button class="btn-ui" onclick="setNav('bottom')">Bas</button>
        <span class="cfg-label">Couleurs</span>
        <button class="btn-ui" onclick="setTheme('#6c63ff','#ff6584')">Original</button>
        <button class="btn-ui" onclick="setTheme('#43e97b','#38f9d7')">Menthe</button>
        <button class="btn-ui" onclick="toggleCfg()" style="margin-top:20px; background:var(--secondary);">Fermer</button>
    </div>

    <div id="phone">
        <header id="app-header">
            <div class="logo">Swivo</div>
            <div class="tabs">
                <div class="tab active" onclick="showSection('pourtoi')">Pour toi</div>
                <div class="tab" onclick="showSection('live')">Live</div>
            </div>
