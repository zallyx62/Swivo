<!DOCTYPE html>

    <style>

        * { margin:0; padding:0; box-sizing:border-box; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
        #app-shell { width: 100%; max-width: 500px; height: 100%; margin: 0 auto; position: relative; display: flex; flex-direction: column; border: 1px solid var(--border); }

        /* AUTH SCREEN */
        .auth-container { position: absolute; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .logo { font-family: 'Syne'; font-size: 3.5rem; background: linear-gradient(135deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .swivo-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); padding: 16px; border-radius: 14px; margin-bottom: 10px; outline: none; }
        .btn-main { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* APP INTERFACE (CACHÉE) */
        .app-content { display: none; flex-direction: column; height: 100%; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); font-family: 'Syne'; color: var(--accent); font-size: 1.5rem; }
        .screen { flex: 1; padding: 20px; overflow-y: auto; }
        .card { background: var(--panel); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .nav { height: 70px; background: var(--panel); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
    </style>
</head>
