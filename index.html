<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo — L'App Intégrale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff; --secondary: #ff6584; --bg: #080810;
            --card: #13131e; --text: #f0f0f8; --accent: #43e97b;
            --gradient: linear-gradient(135deg, #6c63ff, #ff6584);
            --font-size: 0.92rem;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #000; color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- PANNEAU DE PERSONNALISATION --- */
        #config-panel {
            width: 320px; background: #0f0f1a; border-right: 1px solid #222; padding: 25px;
            display: flex; flex-direction: column; gap: 20px; z-index: 3000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cfg-label { font-family: 'Syne'; font-size: 0.7rem; text-transform: uppercase; color: var(--primary); letter-spacing: 1px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ui { background: #1a1a2e; border: 1px solid #333; color: white; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; transition: 0.3s; }
        .btn-ui.active { background: var(--primary); border-color: var(--primary); }

        /* --- APP MOBILE --- */
        #app-container { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg); position: relative; }
        #phone {
            width: 375px; height: 100%; max-height: 812px; background: var(--bg);
            border: 8px solid #1a1a1a; border-radius: 45px; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 45px 20px 10px; text-align: center; z-index: 10; background: var(--bg); }
        .logo { font-family: 'Syne'; font-size: 2.2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tabs { display: flex; justify-content: center; gap: 25px; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding-bottom: 8px; font-size: 0.85rem; font-weight: 700; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 3px solid var(--primary); }

        #main-feed { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        #main-feed::-webkit-scrollbar { display: none; }

        /* CARTES */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.06); }
        .tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--accent); background: rgba(67,233,123,0.1); padding: 4px 10px; border-radius: 8px; }
        .card h3 { font-family: 'Syne'; font-size: 1.3rem; line-height: 1.2; margin-bottom: 10px; }
        .card p { font-size: var(--font-size); opacity: 0.7; line-height: 1.5; }

        /* MASCOTTE */
