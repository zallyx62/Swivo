<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swivo App - Version Finale</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff; --secondary: #ff6584; --bg: #080810;
            --card: #13131e; --text: #f0f0f8; --accent: #43e97b;
            --gradient: linear-gradient(135deg, #6c63ff 0%, #ff6584 100%);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'DM Sans', sans-serif; background: #000; color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* --- CONFIG PANEL --- */
        #config-panel {
            width: 320px; background: #0f0f1a; border-right: 1px solid #222; padding: 25px;
            display: flex; flex-direction: column; gap: 20px; z-index: 1000; transition: transform 0.3s ease;
        }

        /* --- MOBILE VIEW --- */
        #app-wrapper { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: var(--bg); }
        #phone {
            width: 375px; height: 100%; max-height: 812px; background: var(--bg);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            border: 8px solid #1a1a1a; border-radius: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* HEADER */
        header { padding: 40px 20px 10px; text-align: center; position: relative; }
        .logo { font-family: 'Syne'; font-size: 1.8rem; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .settings-trigger { position: absolute; right: 20px; top: 45px; font-size: 1.2rem; cursor: pointer; display: none; }

        .tabs { display: flex; justify-content: center; gap: 20px; margin-top: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { padding: 10px; font-size: 0.8rem; font-weight: 700; opacity: 0.4; cursor: pointer; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--primary); }

        /* CONTENT */
        #main-scroll { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.08); cursor: pointer; }
        .tag { color: var(--accent); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        /* MODAL DETAILS */
        #modal { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 2000; padding: 40px 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* NAV */
        nav { position: absolute; bottom: 0; width: 100%; background: rgba(13,13,25,0.95); display: flex; justify-content: space-around; padding: 15px 10px 35px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { font-size: 1.4rem; opacity: 0.3; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        @media (max-width: 850px) {
            #config-panel { position: absolute; transform: translateX(-100%); width: 280px; height: 100%; }
            #config-panel.open { transform: translateX(0); }
            #phone { width: 100vw; height: 100vh; max-height: none; border: none; border-radius: 0; }
            .settings-trigger { display: block; }
        }
    </style>
</head>
<body>

    <div id="config-panel">
        <h2 style="font-family:'Syne'; color:white;">Personnalisation</h2>
        <p style="font-size:0.7rem; color:var(--primary); text-transform:uppercase;">Thèmes</p>
        <button onclick="setTheme('#6c63ff','#ff6584')" style="background:#6c63ff; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Original</button>
        <button onclick="setTheme('#43e97b','#38f9d7')" style="background:#43e97b; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Émeraude</button>
        <button onclick="closeConfig()" id="close-cfg" style="margin-top:auto; padding:10px; display:none;">Fermer ✕</button>
    </div>

    <div id="app-wrapper">
        <div id="phone">
            <header>
                <div class="logo">Swivo</div>
                <div class="settings-trigger" onclick="toggleConfig()">⚙️</div>
                <div class="tabs">
                    <div class="tab active" onclick="showFeed('pourtoi', this)">Pour toi</div>
                    <div class="tab" onclick="showFeed('live', this)">Live</div>
                </div>
            </header>

            <div id="main-scroll"></div>

            <nav>
                <div class="nav-item active" onclick="navTo('home', this)">🏠</div>
                <div class="nav-item" onclick="navTo('chat', this)">💬</div>
                <div class="nav-item" onclick="navTo('profile', this)">👤</div>
            </nav>

            <div id="modal">
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.5rem; margin-bottom:20px;">✕ Retour</button>
                <div id="modal-content"></div>
            </div>
        </div>
    </div>

    <script>
        const DAILY_TIPS = [
            { tag: "Lundi", title: "Planifie ta semaine", detail: "Prends 10 minutes pour noter tes 3 objectifs principaux. Cela réduit le stress de 25%." },
            { tag: "Mardi", title: "Vérifie tes abonnements", detail: "On perd en moyenne 15€/mois en oubliant de résilier des services inutiles. Fais le tri !" },
            { tag: "Mercredi", title: "Méthode Pomodoro", detail: "25 min de travail, 5 min de pause. C'est le secret pour rester concentré tout l'après-midi." },
            { tag: "Jeudi", title: "Épargne automatique", detail: "Configure un virement de 10€ le lendemain de ton salaire. Tu ne les verras pas passer." },
            { tag: "Vendredi", title: "Cuisine en gros", detail: "Prépare tes repas pour le week-end ce soir. Moins cher et plus sain que les livraisons." },
            { tag: "Samedi", title: "Déconnexion numérique", detail: "Laisse ton téléphone dans une autre pièce pendant 2h. Redécouvre le calme." },
            { tag: "Dimanche", title: "Bilan financier", detail: "Regarde ton compte. Où est allé ton argent ? Prépare ton budget pour demain." }
        ];

        function getDailyTip() {
            const day = new Date().getDay(); // 0 (Dimanche) à 6 (Samedi)
            const tip = DAILY_TIPS[day === 0 ? 6 : day - 1];
            return tip;
        }

        function renderCard(item) {
            return `
                <div class="card" onclick="openDetails('${item.title}', '${item.detail}')">
                    <span class="tag">${item.tag}</span>
                    <h3>${item.title}</h3>
                    <p style="font-size:0.8rem; opacity:0.6;">Clique pour voir les détails...</p>
                </div>
            `;
        }

        function showFeed(type) {
            const scroll = document.getElementById('main-scroll');
            const daily = getDailyTip();
            if(type === 'pourtoi') {
                scroll.innerHTML = `<p style="font-size:0.7rem; margin-bottom:10px; opacity:0.5;">CONSEIL DU JOUR</p>` + renderCard(daily) + 
                renderCard({tag:"Finance", title:"Aide au logement", detail:"N'oublie pas de vérifier tes droits à l'APL sur le site de la CAF dès maintenant."});
            } else {
                scroll.innerHTML = renderCard({tag:"DIRECT", title:"Live Orientation", detail:"@Marie répond à vos questions sur les études supérieures. Rejoignez le chat !"});
            }
        }

        function openDetails(title, text) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'block';
            content.innerHTML = `<h2 style="font-family:'Syne'; margin-bottom:15px;">${title}</h2><p style="line-height:1.6; opacity:0.8;">${text}</p>`;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function navTo(page, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            const scroll = document.getElementById('main-scroll');
            if(page === 'chat') {
                scroll.innerHTML = `<h3>Messages</h3><p style="margin-top:20px; opacity:0.5;">Aucune conversation pour le moment.</p>`;
            } else if(page === 'profile') {
                scroll.innerHTML = `<h3>Paramètres</h3><div class="card">Compte</div><div class="card">Notifications</div><div class="card">Sécurité</div>`;
            } else { showFeed('pourtoi'); }
        }

        function toggleConfig() { document.getElementById('config-panel').classList.toggle('open'); document.getElementById('close-cfg').style.display = 'block'; }
        function closeConfig() { document.getElementById('config-panel').classList.remove('open'); }
        function setTheme(c1, c2) { 
            document.documentElement.style.setProperty('--primary', c1); 
            document.documentElement.style.setProperty('--gradient', `linear-gradient(135deg, ${c1} 0%, ${c2} 100%)`);
        }

        window.onload = () => showFeed('pourtoi');
    </script>
</body>
</html>
